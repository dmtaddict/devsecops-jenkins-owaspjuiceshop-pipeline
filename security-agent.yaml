apiVersion: v1
kind: Pod
metadata:
  labels:
    role: jenkins-agent
spec:
  containers:
  # Этот контейнер гарантирует, что под будет жить столько, сколько нужно пайплайну
  - name: pause-agent
    image: alpine:3.18
    command: ["sh", "-c", "trap 'exit 0' SIGTERM; while true; do sleep 30; done"]

  - name: trufflehog
    image: trufflesecurity/trufflehog:3.88.0
    
  - name: gitleaks
    image: zricethezav/gitleaks:v8.24.2

  - name: semgrep
    image: semgrep/semgrep:1.114.0

  - name: dependency-check
    image: owasp/dependency-check:12.1.0
    volumeMounts:
    - name: dc-cache
      mountPath: /usr/share/dependency-check/data

  - name: syft
    image: anchore/syft:v1.22.0

  - name: grype
    image: anchore/grype:v0.114.0-nonroot

  - name: kaniko
    image: gcr.io/kaniko-project/executor:v1.23.2-debug

  - name: trivy
    image: aquasec/trivy:0.61.0
    volumeMounts:
    - name: trivy-cache
      mountPath: /root/.cache/trivy 

  - name: zap
    image: ghcr.io/zaproxy/zaproxy:2.16.1

  volumes:
  - name: dc-cache
    persistentVolumeClaim:
      claimName: dependency-check-cache
  - name: trivy-cache
    persistentVolumeClaim:
      claimName: trivy-cache
