apiVersion: v1
kind: Pod
metadata:
  labels:
    role: jenkins-agent
spec:
  containers:
  - name: trufflehog
    image: trufflesecurity/trufflehog:3.88.0
    command: ["tail", "-f", "/dev/null"]
    tty: true
    
  - name: gitleaks
    image: zricethezav/gitleaks:v8.24.2
    command: ["tail", "-f", "/dev/null"]
    tty: true

  - name: semgrep
    image: semgrep/semgrep:1.114.0
    command: ["sh", "-c", "clear; tail -f /dev/null"]
    tty: true

    - name: npm
    image: node:20-alpine
    command: ["sh", "-c", "clear; tail -f /dev/null"]
    tty: true

  - name: dependency-check
    image: owasp/dependency-check:12.1.0
    command: ["tail", "-f", "/dev/null"]
    tty: true
    volumeMounts:
    - name: dc-cache
      mountPath: /usr/share/dependency-check/data

  # Официальный debug-образ от Anchore. В нем ЕСТЬ shell и cat!
  - name: syft
    image: anchore/syft:v1.22.0-debug
    command: ["cat"]
    tty: true

  # Официальный debug-образ от Anchore. Здесь тоже ЕСТЬ shell и cat!
  - name: grype
    image: anchore/grype:v0.114.0-debug
    command: ["cat"]
    tty: true

  # В debug-версии kaniko гарантированно есть shell и cat
  - name: kaniko
    image: gcr.io/kaniko-project/executor:v1.23.2-debug
    command: ["cat"]
    tty: true

  - name: trivy
    image: aquasec/trivy:0.61.0
    command: ["tail", "-f", "/dev/null"]
    tty: true
    volumeMounts:
    - name: trivy-cache
      mountPath: /root/.cache/trivy 

  - name: zap
    image: ghcr.io/zaproxy/zaproxy:2.16.1
    command: ["tail", "-f", "/dev/null"]
    tty: true

  volumes:
  - name: dc-cache
    persistentVolumeClaim:
      claimName: dependency-check-cache
  - name: trivy-cache
    persistentVolumeClaim:
      claimName: trivy-cache
